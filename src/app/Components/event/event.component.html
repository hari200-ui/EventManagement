<div class="event-container">
  <!-- your form and table code -->

<form [formGroup]="eventForm" (ngSubmit)="addOrUpdateEvent()" class="event-form">
  <input placeholder="Event Name" formControlName="name" />
  <input type="date" formControlName="date" />
  <input placeholder="Location" formControlName="location" />

  <button mat-button color="primary" type="submit">
    {{ editingIndex !== null ? 'Update Event' : 'Create Event' }}
  </button>
  <button mat-button type="button" *ngIf="editingIndex !== null" (click)="cancelEdit()">
    Cancel
  </button>
</form>

<!-- Event Table -->
<table mat-table [dataSource]="dataSource" class="mat-elevation-z8 demo-table">
  <!-- ID Column -->
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef> ID </th>
    <td mat-cell *matCellDef="let event"> {{event.id}} </td>
  </ng-container>

  <!-- Name Column -->
  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef> Name </th>
    <td mat-cell *matCellDef="let event"> {{event.name}} </td>
  </ng-container>

  <!-- Date Column -->
  <ng-container matColumnDef="date">
    <th mat-header-cell *matHeaderCellDef> Date </th>
    <td mat-cell *matCellDef="let event"> {{event.date}} </td>
  </ng-container>

  <!-- Location Column -->
  <ng-container matColumnDef="location">
    <th mat-header-cell *matHeaderCellDef> Location </th>
    <td mat-cell *matCellDef="let event"> {{event.location}} </td>
  </ng-container>

  <!-- Actions Column -->
  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef> Actions </th>
    <td mat-cell *matCellDef="let event; let i = index">
      <button mat-button (click)="editEvent(i)">Edit</button>
      <button mat-button color="warn" (click)="deleteEvent(i)">Delete</button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>

</div>
