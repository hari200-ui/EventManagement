<nav class="navbar bg-body-tertiary">
  <div class="container-fluid">
    <a class="navbar-brand">Navbar</a>
    <form class="d-flex ms-auto" role="search">
      <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" />
      <button class="btn btn-outline-success" type="submit">Search</button>
    </form>
  </div>
</nav>

<!-- Display pushed events -->
<div class="container mt-4">
  <h2>Pushed Events</h2>
  <div *ngIf="pushedEvents.length === 0">No events have been pushed yet.</div>
  <div *ngFor="let event of pushedEvents" class="card mb-3 p-3">
    <h4>{{ event.name }}</h4>
    <p><strong>Date:</strong> {{ event.date }} | <strong>Time:</strong> {{ event.time }}</p>
    <p><strong>Location:</strong> {{ event.location }}</p>
    <p><strong>About:</strong> {{ event.about }}</p>
    <img *ngIf="event.image" [src]="event.image" alt="Event Image" width="100" height="100" />
  </div>
</div>
