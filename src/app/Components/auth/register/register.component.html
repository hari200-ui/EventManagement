<div class="login-container">
  <form [formGroup]="registerForm">
    <div>
      <mat-form-field appearance="outline">
        <mat-label>Username</mat-label>
        <input formControlName="username" matInput placeholder="Username">
      </mat-form-field>
    </div>

    <div>
      <mat-form-field appearance="outline">
        <mat-label>Email</mat-label>
        <input formControlName="email" matInput placeholder="Email">
      </mat-form-field>
    </div>

    <div>
      <mat-form-field appearance="outline">
        <mat-label>Phonenumber</mat-label>
        <input formControlName="phonenumber" matInput placeholder="Phonenumber">
      </mat-form-field>
    </div>

    <div>
      <mat-form-field appearance="outline">
  <mat-label>Password</mat-label>
  <input
    [type]="hide ? 'password' : 'text'"
    formControlName="password"
    matInput
    placeholder="Password"
  >

  <!-- Toggle Visibility Button -->
  <button
    mat-icon-button
    matSuffix
    type="button"
    (click)="hide = !hide"
    [attr.aria-label]="'Toggle password visibility'"
    [attr.aria-pressed]="!hide"
  >
    <mat-icon>{{ hide ? 'visibility_off' : 'visibility' }}</mat-icon>
  </button>

  <!-- Info Icon for Password Requirements -->
  <button
    mat-icon-button
    matSuffix
    type="button"
    matTooltip="Password must be at least 8 characters, include uppercase, lowercase, number, and special character."
    aria-label="Password requirements"
  >
    <mat-icon>info</mat-icon>
  </button>
</mat-form-field>

    </div>

    <div>
      <button
        (click)="register()"
        [disabled]="!registerForm.valid"
        mat-raised-button
        color="primary"
        matTooltip="Please enter your details"
      >
        Sign in
      </button>
    </div>
  </form>

  <span>
    Already have an account?
    <a class="registerlink" (click)="login()">Login</a>
  </span>
</div>
